# GitLab CI template for AI PR Reviewer
# Copy this into your repo's .gitlab-ci.yml (or include it)
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   ANTHROPIC_API_KEY  - Anthropic API key
#   GITLAB_TOKEN       - GitLab access token with api scope (for posting MR comments)

ai-review:
  stage: test
  image: node:20-alpine
  rules:
    # Only run on merge requests (not draft)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE !~ /^Draft:/'
  before_script:
    - apk add --no-cache git
    - npm install -g ts-node typescript
    - git clone https://github.com/gauravs08/ai-pr-reviewer.git /tmp/ai-pr-reviewer
    - cd /tmp/ai-pr-reviewer && npm install --production
  script:
    - cd $CI_PROJECT_DIR
    - |
      export ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
      export GITLAB_TOKEN=$GITLAB_TOKEN
      node /tmp/ai-pr-reviewer/dist-cli/index.js \
        --platform gitlab \
        --base $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
  allow_failure: true
